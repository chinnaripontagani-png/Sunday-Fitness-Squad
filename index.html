<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- 🔥 MOBILE OPTIMIZATION -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sunday Fitness Squad</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    color: white;
    text-align: center;

    background: black;
    background-size: cover;
    background-position: center;

    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    transition: background-image 0.8s ease;
}

/* overlay */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.75);
    z-index: 1;
}

/* container */
.container {
    position: relative;
    z-index: 2;
    width: 90%;
    max-width: 420px;
}

/* heading */
h1 {
    font-size: 24px;
    color: #ff2e63;
}

/* input */
input {
    padding: 14px;
    width: 90%;
    border-radius: 10px;
    border: none;
    font-size: 16px;
}

/* buttons */
button {
    width: 100%;
    padding: 16px;
    margin-top: 15px;
    font-size: 16px;

    background: linear-gradient(45deg, red, #ff2e63);
    color: white;
    border: none;
    border-radius: 10px;
    box-shadow: 0 0 15px red;
}

/* workout text */
.workout {
    font-size: 22px;
    margin-top: 10px;
}

/* countdown */
.countdown {
    font-size: 55px;
    color: yellow;
}

/* timer */
.timer {
    font-size: 32px;
    color: lime;
}

/* progress */
.progressBar {
    width: 100%;
    height: 12px;
    background: #333;
    margin: 15px 0;
    border-radius: 10px;
}

.progressFill {
    height: 100%;
    width: 0%;
    background: lime;
}

.hidden { display: none; }

</style>
</head>

<body>

<div class="overlay"></div>

<div id="nameScreen" class="container">
    <h1>Sunday Fitness Squad 💪</h1>
    <input id="username" placeholder="Enter your name">
    <button onclick="join()">Join</button>
</div>

<div id="mainScreen" class="hidden container">
    <h1>Welcome <span id="displayName"></span></h1>
    <button onclick="startWorkout()">Start Workout</button>
</div>

<div id="workoutScreen" class="hidden container">
    <h1 id="workoutTitle"></h1>
    <div id="countdown" class="countdown hidden"></div>
    <div id="workoutText" class="workout"></div>

    <div class="progressBar">
        <div id="progressFill" class="progressFill"></div>
    </div>

    <button onclick="completeWorkout()">Completed</button>
    <div id="timer" class="timer hidden"></div>
</div>

<div id="endScreen" class="hidden container">
    <h1>🔥 You crushed it!</h1>
</div>

<script>
let workouts = [
"Skipping - 100","Jumping Jacks - 100","Squats - 20","Crunches",
"Russian Twists","Bicycle Crunches","Leg Crunches","Push-ups - 10",
"Diamond Push-ups - 10","Wide Push-ups - 10","Dips - 10",
"Pullups - 5","Bicep","Plank - 30 secs","Stretches"
];

let backgrounds = [
"https://images.pexels.com/photos/1552242/pexels-photo-1552242.jpeg",
"https://images.pexels.com/photos/1552252/pexels-photo-1552252.jpeg",
"https://images.pexels.com/photos/841130/pexels-photo-841130.jpeg",
"https://images.pexels.com/photos/416717/pexels-photo-416717.jpeg",
"https://images.pexels.com/photos/2261477/pexels-photo-2261477.jpeg",
"https://images.pexels.com/photos/2294361/pexels-photo-2294361.jpeg",
"https://images.pexels.com/photos/3838389/pexels-photo-3838389.jpeg",
"https://images.pexels.com/photos/841130/pexels-photo-841130.jpeg",
"https://images.pexels.com/photos/1552242/pexels-photo-1552242.jpeg",
"https://images.pexels.com/photos/1552252/pexels-photo-1552252.jpeg",
"https://images.pexels.com/photos/2261477/pexels-photo-2261477.jpeg",
"https://images.pexels.com/photos/3838389/pexels-photo-3838389.jpeg",
"https://images.pexels.com/photos/841130/pexels-photo-841130.jpeg",
"https://images.pexels.com/photos/416717/pexels-photo-416717.jpeg",
"https://images.pexels.com/photos/1552242/pexels-photo-1552242.jpeg"
];

let currentWorkout = 0;
let timerDuration = 30; // 🔥 CHANGED TO 30 SECONDS

function speak(text){
    speechSynthesis.cancel();
    speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}

function setBackground(i){
    document.body.style.backgroundImage = `url('${backgrounds[i]}')`;
}

function join(){
    let name = username.value;
    if(!name) return alert("Enter name");

    displayName.innerText = name;
    nameScreen.classList.add("hidden");
    mainScreen.classList.remove("hidden");

    speak("Welcome " + name);
}

function startWorkout(){
    mainScreen.classList.add("hidden");
    workoutScreen.classList.remove("hidden");
    countdown(showWorkout);
}

function countdown(cb){
    let c = 3;
    countdownEl = document.getElementById("countdown");
    countdownEl.classList.remove("hidden");

    let i = setInterval(()=>{
        if(c>0){
            countdownEl.innerText=c;
            speak(c);
            c--;
        }else{
            countdownEl.innerText="GO!";
            speak("Go");
            clearInterval(i);
            setTimeout(()=>{
                countdownEl.classList.add("hidden");
                cb();
            },800);
        }
    },1000);
}

function showWorkout(){
    if(currentWorkout>=workouts.length){
        workoutScreen.classList.add("hidden");
        endScreen.classList.remove("hidden");
        speak("Workout complete");
        return;
    }

    workoutTitle.innerText="Workout "+(currentWorkout+1);
    workoutText.innerText=workouts[currentWorkout];

    setBackground(currentWorkout);

    progressFill.style.width=(currentWorkout/workouts.length)*100+"%";

    speak("Next workout " + workouts[currentWorkout]);
}

function completeWorkout(){
    speak("Rest time");

    timer.classList.remove("hidden");
    let t=timerDuration;

    let i=setInterval(()=>{
        t--;
        timer.innerText="Rest: "+t;

        if(t<=0){
            clearInterval(i);
            timer.classList.add("hidden");
            currentWorkout++;
            countdown(showWorkout);
        }
    },1000);
}
</script>

</body>
</html>
