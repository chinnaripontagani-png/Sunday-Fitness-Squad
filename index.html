<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunday Fitness Squad</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    color: white;
    text-align: center;

    background: black;
    background-size: cover;
    background-position: center;

    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    transition: background-image 0.8s ease-in-out;
}

.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.75);
    z-index: 1;
}

.container {
    position: relative;
    z-index: 2;
    width: 90%;
    max-width: 500px;
}

h1 {
    color: #ff2e63;
    text-shadow: 0 0 20px #ff2e63;
}

input {
    padding: 12px;
    width: 80%;
    border-radius: 8px;
    border: none;
}

button {
    padding: 14px 30px;
    margin-top: 20px;
    background: linear-gradient(45deg, red, #ff2e63);
    color: white;
    border: none;
    border-radius: 8px;
    box-shadow: 0 0 20px red;
    cursor: pointer;
}

button:hover {
    transform: scale(1.1);
}

.hidden { display: none; }

.workout {
    font-size: 30px;
    margin-top: 15px;
}

.countdown {
    font-size: 60px;
    color: yellow;
    animation: pulse 1s infinite;
}

.timer {
    font-size: 40px;
    color: lime;
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0% {transform: scale(1);}
    50% {transform: scale(1.2);}
    100% {transform: scale(1);}
}

.progressBar {
    width: 100%;
    height: 15px;
    background: #333;
    margin: 20px 0;
    border-radius: 10px;
}

.progressFill {
    height: 100%;
    width: 0%;
    background: lime;
    transition: width 0.5s;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div id="nameScreen" class="container">
    <h1>Sunday Fitness Squad 💪</h1>
    <input id="username" placeholder="Enter your name">
    <br>
    <button onclick="join()">Join</button>
</div>

<div id="mainScreen" class="hidden container">
    <h1>Welcome <span id="displayName"></span></h1>
    <button onclick="startWorkout()">Start Workout</button>
</div>

<div id="workoutScreen" class="hidden container">
    <h1 id="workoutTitle"></h1>
    <div id="countdown" class="countdown hidden"></div>
    <div id="workoutText" class="workout"></div>

    <div class="progressBar">
        <div class="progressFill" id="progressFill"></div>
    </div>

    <button onclick="completeWorkout()">Completed</button>
    <div id="timer" class="timer hidden"></div>
</div>

<div id="endScreen" class="hidden container">
    <h1>🔥 YOU CRUSHED IT!</h1>
</div>

<script>
let workouts = [
"Skipping - 100",
"Jumping Jacks - 100",
"Squats - 20",
"Crunches",
"Russian Twists",
"Bicycle Crunches",
"Leg Crunches",
"Push-ups - 10",
"Diamond Push-ups - 10",
"Wide Push-ups - 10",
"Dips - 10",
"Pullups - 5",
"Bicep",
"Plank - 30 secs",
"Stretches"
];

let backgrounds = [
"https://images.pexels.com/photos/1552242/pexels-photo-1552242.jpeg",
"https://images.pexels.com/photos/1552252/pexels-photo-1552252.jpeg",
"https://images.pexels.com/photos/841130/pexels-photo-841130.jpeg",
"https://images.pexels.com/photos/416717/pexels-photo-416717.jpeg",
"https://images.pexels.com/photos/2261477/pexels-photo-2261477.jpeg",
"https://images.pexels.com/photos/2294361/pexels-photo-2294361.jpeg",
"https://images.pexels.com/photos/3838389/pexels-photo-3838389.jpeg",
"https://images.pexels.com/photos/841130/pexels-photo-841130.jpeg",
"https://images.pexels.com/photos/1552242/pexels-photo-1552242.jpeg",
"https://images.pexels.com/photos/1552252/pexels-photo-1552252.jpeg",
"https://images.pexels.com/photos/2261477/pexels-photo-2261477.jpeg",
"https://images.pexels.com/photos/3838389/pexels-photo-3838389.jpeg",
"https://images.pexels.com/photos/841130/pexels-photo-841130.jpeg",
"https://images.pexels.com/photos/416717/pexels-photo-416717.jpeg",
"https://images.pexels.com/photos/1552242/pexels-photo-1552242.jpeg"
];

let currentWorkout = 0;
let timerDuration = 90;

// 🔊 Voice
function speak(text) {
    speechSynthesis.cancel();
    let msg = new SpeechSynthesisUtterance(text);
    speechSynthesis.speak(msg);
}

// 🔥 Countdown
function countdownStart(callback) {
    let count = 3;
    let el = document.getElementById("countdown");
    el.classList.remove("hidden");

    speak("Get ready");

    let int = setInterval(() => {
        if (count > 0) {
            el.innerText = count;
            speak(count);
            count--;
        } else {
            el.innerText = "GO!";
            speak("Go");
            clearInterval(int);

            setTimeout(() => {
                el.classList.add("hidden");
                callback();
            }, 800);
        }
    }, 1000);
}

// background loader
function setBackground(index) {
    let img = new Image();
    img.src = backgrounds[index];
    img.onload = () => {
        document.body.style.backgroundImage = `url('${backgrounds[index]}')`;
    };
}

function join() {
    let name = document.getElementById("username").value;
    if (!name) return alert("Enter name");

    document.getElementById("displayName").innerText = name;

    document.getElementById("nameScreen").classList.add("hidden");
    document.getElementById("mainScreen").classList.remove("hidden");

    speak("Welcome " + name);
}

function startWorkout() {
    document.getElementById("mainScreen").classList.add("hidden");
    document.getElementById("workoutScreen").classList.remove("hidden");

    speak("Starting workout");
    countdownStart(showWorkout);
}

function showWorkout() {
    if (currentWorkout >= workouts.length) {
        document.getElementById("workoutScreen").classList.add("hidden");
        document.getElementById("endScreen").classList.remove("hidden");
        speak("Workout complete. Great job!");
        return;
    }

    let text = workouts[currentWorkout];

    document.getElementById("workoutTitle").innerText =
        "Workout " + (currentWorkout + 1);

    document.getElementById("workoutText").innerText = text;

    setBackground(currentWorkout);

    let percent = (currentWorkout / workouts.length) * 100;
    document.getElementById("progressFill").style.width = percent + "%";

    speak("Next workout " + text);
}

function completeWorkout() {
    speak("Rest time");

    let timerEl = document.getElementById("timer");
    timerEl.classList.remove("hidden");

    let t = timerDuration;

    let interval = setInterval(() => {
        t--;
        timerEl.innerText = "Rest: " + t;

        if (t <= 0) {
            clearInterval(interval);
            timerEl.classList.add("hidden");

            currentWorkout++;
            countdownStart(showWorkout);
        }
    }, 1000);
}
</script>

</body>
</html>
