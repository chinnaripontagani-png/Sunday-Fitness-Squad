<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunday Fitness Squad</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    color: white;
    text-align: center;
    height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    background: black;
}

/* animated glow */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,0,80,0.25), transparent 70%);
    animation: moveGlow 10s linear infinite;
}

@keyframes moveGlow {
    0% { transform: translate(-25%, -25%); }
    50% { transform: translate(25%, 25%); }
    100% { transform: translate(-25%, -25%); }
}

/* background */
.bg {
    position: fixed;
    width: 100%;
    height: 100dvh;
    background-size: cover;
    background-position: center;
    animation: zoom 12s infinite alternate ease-in-out;
    transition: background-image 0.6s ease;
    z-index: -1;
}

@keyframes zoom {
    from { transform: scale(1); }
    to { transform: scale(1.1); }
}

.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.65);
}

/* container */
.container {
    position: relative;
    width: 92%;
    max-width: 420px;
    padding: 20px;
    box-sizing: border-box;
}

/* heading */
h1 {
    font-size: 24px;
    color: #ff2e63;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px red; }
    to { text-shadow: 0 0 25px #ff2e63; }
}

/* workout text */
.workout {
    font-size: 20px;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
}

input, button {
    width: 100%;
    padding: 16px;
    margin-top: 12px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
}

button {
    background: linear-gradient(45deg, red, #ff2e63);
    color: white;
}

/* progress */
.progressBar {
    width: 100%;
    height: 10px;
    background: #333;
    margin: 10px 0;
}

.progressFill {
    height: 100%;
    width: 0%;
    background: lime;
}

.timer { font-size: 26px; color: lime; }
.countdown { font-size: 48px; color: yellow; }

.hidden { display: none; }
</style>
</head>

<body>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" loop>
    <source src="music/gym.mp3" type="audio/mpeg">
</audio>

<div id="bg" class="bg"></div>
<div class="overlay"></div>

<div id="nameScreen" class="container">
    <h1>Sunday Fitness Squad 💪</h1>
    <input id="username" placeholder="Enter your name">
    <button onclick="join()">Join</button>
</div>

<div id="mainScreen" class="hidden container">
    <h1>Welcome <span id="displayName"></span></h1>
    <button onclick="startWorkout()">Start Workout</button>
</div>

<div id="workoutScreen" class="hidden container">
    <h1 id="workoutTitle"></h1>
    <div id="countdown" class="countdown hidden"></div>
    <div id="workoutText" class="workout"></div>

    <div class="progressBar">
        <div id="progressFill" class="progressFill"></div>
    </div>

    <button id="completeBtn" onclick="completeWorkout()">Completed</button>
    <button id="skipBtn" class="hidden" onclick="skipRest()">⏭ Skip Rest</button>

    <div id="timer" class="timer hidden"></div>
</div>

<div id="endScreen" class="hidden container">
    <h1>🔥 YOU CRUSHED IT! See you next Sunday!</h1>
</div>

<script>
let workouts = [
"Skipping - 100","Jumping Jacks - 100","Squats - 20","Crunches",
"Russian Twists","Bicycle Crunches","Leg Crunches","Push-ups - 10",
"Diamond Push-ups - 10","Wide Push-ups - 10","Dips - 10",
"Pullups - 5","Bicep","Plank - 30 secs","Stretches"
];

let backgrounds = [
"https://images.unsplash.com/photo-1599058917212-d750089bc07e",
"https://images.unsplash.com/photo-1594737625785-c1c8d1c8d88b",
"https://images.unsplash.com/photo-1598970434795-0c54fe7c0648",
"https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b",
"https://images.unsplash.com/photo-1605296867304-46d5465a13f1",
"https://images.unsplash.com/photo-1583454110551-21f2fa2afe61",
"https://images.unsplash.com/photo-1583454110551-21f2fa2afe61",
"https://images.unsplash.com/photo-1598970434795-0c54fe7c0648",
"https://images.unsplash.com/photo-1598970434795-0c54fe7c0648",
"https://images.unsplash.com/photo-1598970434795-0c54fe7c0648",
"https://images.unsplash.com/photo-1579758629938-03607ccdbaba",
"https://images.unsplash.com/photo-1576678927484-cc907957088c",
"https://images.unsplash.com/photo-1517836357463-d25dfeac3438",
"https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b",
"https://images.unsplash.com/photo-1558611848-73f7eb4001ab"
];

let currentWorkout = 0;
let timerDuration = 30;
let timerInterval;

let music = document.getElementById("bgMusic");
music.volume = 0.4;

// 🎤 coach voice with music control
function speak(text){
    speechSynthesis.cancel();
    music.pause();

    let utter = new SpeechSynthesisUtterance(text);

    utter.onend = () => {
        music.play();
    };

    speechSynthesis.speak(utter);
}

function setBackground(i){
    document.getElementById("bg").style.backgroundImage =
    `url('${backgrounds[i]}?auto=format&fit=crop&w=800&q=80')`;
}

function join(){
    let name = username.value;
    if(!name) return alert("Enter name");

    displayName.innerText = name;
    nameScreen.classList.add("hidden");
    mainScreen.classList.remove("hidden");

    music.play();
    speak("Welcome " + name);
}

function startWorkout(){
    mainScreen.classList.add("hidden");
    workoutScreen.classList.remove("hidden");
    countdown(showWorkout);
}

function countdown(cb){
    let c=3;
    let el=document.getElementById("countdown");
    el.classList.remove("hidden");

    let i=setInterval(()=>{
        if(c>0){
            el.innerText=c;
            speak(c);
            c--;
        } else {
            el.innerText="GO!";
            speak("Go");
            clearInterval(i);
            setTimeout(()=>{
                el.classList.add("hidden");
                cb();
            },800);
        }
    },1000);
}

function showWorkout(){
    document.getElementById("skipBtn").classList.add("hidden");
    document.getElementById("completeBtn").classList.remove("hidden");

    if(currentWorkout>=workouts.length){
        workoutScreen.classList.add("hidden");
        endScreen.classList.remove("hidden");

        music.pause();
        speak("Workout complete. You did great!");
        return;
    }

    workoutTitle.innerText="Workout "+(currentWorkout+1);
    workoutText.innerText=workouts[currentWorkout];

    setBackground(currentWorkout);

    progressFill.style.width=(currentWorkout/workouts.length)*100+"%";

    speak("Next workout " + workouts[currentWorkout]);
}

function completeWorkout(){
    speak("Rest time");

    document.getElementById("completeBtn").classList.add("hidden");
    document.getElementById("skipBtn").classList.remove("hidden");

    timer.classList.remove("hidden");
    let t=timerDuration;
    timer.innerText="Rest: "+t;

    timerInterval=setInterval(()=>{
        t--;
        timer.innerText="Rest: "+t;

        if(t<=0){
            nextWorkout();
        }
    },1000);
}

function skipRest(){
    nextWorkout();
}

function nextWorkout(){
    clearInterval(timerInterval);
    timer.classList.add("hidden");
    document.getElementById("skipBtn").classList.add("hidden");

    currentWorkout++;
    countdown(showWorkout);
}
</script>

</body>
</html>
